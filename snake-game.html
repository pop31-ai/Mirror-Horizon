<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
  overflow: hidden;
}
h1 {
  font-size: 2rem;
  margin-bottom: 10px;
  text-shadow: 0 0 20px #00ff88;
  letter-spacing: 4px;
}
#info {
  display: flex;
  gap: 40px;
  margin-bottom: 15px;
  font-size: 1.1rem;
}
#info span { color: #00ff88; font-weight: bold; }
canvas {
  border: 2px solid #00ff88;
  border-radius: 8px;
  box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
}
#overlay {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
}
#overlay h2 { font-size: 2rem; text-shadow: 0 0 15px #ff4444; }
#overlay p { font-size: 1.1rem; color: #aaa; }
button {
  padding: 12px 36px;
  font-size: 1.1rem;
  border: 2px solid #00ff88;
  background: transparent;
  color: #00ff88;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
button:hover {
  background: #00ff88;
  color: #0a0a2e;
}
#controls {
  margin-top: 15px;
  color: #555;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<h1>SNAKE</h1>
<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>Best: <span id="best">0</span></div>
  <div>Speed: <span id="speed">1</span></div>
</div>
<div style="position:relative;">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay">
    <h2 id="overlayTitle">Ready?</h2>
    <p id="overlayMsg">Press SPACE to start</p>
    <button id="startBtn" onclick="startGame()">START</button>
  </div>
</div>
<div id="controls">WASD or Arrow Keys to move | SPACE to pause</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const startBtn = document.getElementById('startBtn');

const GRID = 20;
const CELLS = canvas.width / GRID;
let snake, dir, nextDir, food, score, best = 0, gameLoop, running, paused;
let particles = [];
let speed, interval;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  speed = 1;
  interval = 120;
  placeFood();
  updateUI();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*CELLS), y: Math.floor(Math.random()*CELLS)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('speed').textContent = speed;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: x * GRID + GRID/2,
      y: y * GRID + GRID/2,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6,
      life: 1,
      color
    });
  }
}

function draw() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // grid
  ctx.strokeStyle = 'rgba(0,255,136,0.03)';
  for (let i = 0; i < CELLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i*GRID, 0);
    ctx.lineTo(i*GRID, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i*GRID);
    ctx.lineTo(canvas.width, i*GRID);
    ctx.stroke();
  }

  // food glow
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(food.x*GRID + GRID/2, food.y*GRID + GRID/2, GRID/2 - 2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // snake
  snake.forEach((s, i) => {
    const brightness = 1 - (i / snake.length) * 0.6;
    const g = Math.floor(255 * brightness);
    ctx.fillStyle = `rgb(0,${g},${Math.floor(136*brightness)})`;
    if (i === 0) {
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 12;
    }
    const pad = i === 0 ? 1 : 2;
    ctx.fillRect(s.x*GRID+pad, s.y*GRID+pad, GRID-pad*2, GRID-pad*2);
    ctx.shadowBlur = 0;
  });

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-1, p.y-1, 3, 3);
  });
  ctx.globalAlpha = 1;

  // update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    return p.life > 0;
  });
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wrap around
  if (head.x < 0) head.x = CELLS-1;
  if (head.x >= CELLS) head.x = 0;
  if (head.y < 0) head.y = CELLS-1;
  if (head.y >= CELLS) head.y = 0;

  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > best) best = score;
    spawnParticles(food.x, food.y, '#ff4444');
    placeFood();
    // speed up every 50 points
    if (score % 50 === 0 && interval > 50) {
      interval -= 10;
      speed++;
      clearInterval(gameLoop);
      gameLoop = setInterval(step, interval);
    }
  } else {
    snake.pop();
  }

  updateUI();
  draw();
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  snake.forEach(s => spawnParticles(s.x, s.y, '#00ff88'));
  overlayTitle.textContent = 'Game Over';
  overlayMsg.textContent = `Score: ${score}`;
  startBtn.textContent = 'RESTART';
  overlay.style.display = 'flex';
  draw();
}

function startGame() {
  overlay.style.display = 'none';
  init();
  running = true;
  paused = false;
  draw();
  gameLoop = setInterval(step, interval);
}

function togglePause() {
  if (!running) return;
  if (paused) {
    gameLoop = setInterval(step, interval);
    paused = false;
    overlay.style.display = 'none';
  } else {
    clearInterval(gameLoop);
    paused = true;
    overlayTitle.textContent = 'Paused';
    overlayMsg.textContent = 'Press SPACE to resume';
    startBtn.style.display = 'none';
    overlay.style.display = 'flex';
  }
}

document.addEventListener('keydown', e => {
  const key = e.key;
  if (key === ' ' || key === 'Spacebar') {
    e.preventDefault();
    if (!running || paused) {
      startBtn.style.display = '';
      if (!running) startGame(); else togglePause();
    } else {
      togglePause();
    }
    return;
  }
  if (paused || !running) return;

  const dirs = {
    'ArrowUp':    {x:0,y:-1}, 'w': {x:0,y:-1}, 'W': {x:0,y:-1},
    'ArrowDown':  {x:0,y:1},  's': {x:0,y:1},  'S': {x:0,y:1},
    'ArrowLeft':  {x:-1,y:0}, 'a': {x:-1,y:0}, 'A': {x:-1,y:0},
    'ArrowRight': {x:1,y:0},  'd': {x:1,y:0},  'D': {x:1,y:0},
  };

  const newDir = dirs[key];
  if (newDir && (newDir.x + dir.x !== 0 || newDir.y + dir.y !== 0)) {
    nextDir = newDir;
  }
});

init();
draw();
</script>
</body>
</html>
