<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>3D Track Racer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff}
canvas{display:block;position:absolute;top:0;left:0}
#menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#menu h1{font-size:48px;background:linear-gradient(90deg,#ff4444,#ffaa00,#44ff44,#4488ff,#ff44ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
#menu .sub{color:#888;margin-bottom:24px;font-size:14px}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.lvl-btn{padding:14px 16px;border:2px solid #333;border-radius:12px;background:rgba(20,20,40,.92);cursor:pointer;text-align:center;transition:all .2s;min-width:140px}
.lvl-btn:hover{border-color:#ffd700;background:rgba(40,40,60,.95);transform:scale(1.05)}
.lvl-btn.locked{opacity:.35;cursor:not-allowed}
.lvl-btn .name{font-size:16px;font-weight:bold;margin-bottom:3px}
.lvl-btn .desc{font-size:11px;color:#999}
.lvl-btn .icon{font-size:28px;margin-bottom:4px}
#hud{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.72);padding:10px 16px;border-radius:10px;border:1px solid #333;font-size:13px;line-height:1.7;display:none}
#hud .pos{font-size:26px;font-weight:bold;color:#ffd700}
#hud .lap{color:#7f7}
#hud .spd{color:#7bf}
#minimap{position:absolute;bottom:10px;right:10px;width:160px;height:160px;background:rgba(0,0,0,.55);border:1px solid #444;border-radius:8px;display:none}
#ctrl{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.55);padding:6px 12px;border-radius:8px;font-size:11px;color:#aaa;display:none}
#nitro{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);width:180px;height:10px;background:rgba(0,0,0,.55);border:1px solid #555;border-radius:5px;display:none}
#nitroF{height:100%;background:linear-gradient(90deg,#0088ff,#00eeff);border-radius:5px;transition:width .08s}
#finish{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:90}
#finish h2{font-size:38px;color:#ffd700;margin-bottom:8px}
#finish .st{font-size:16px;color:#ccc;margin-bottom:20px;text-align:center;line-height:1.8}
#finish button{padding:12px 32px;font-size:16px;background:#2255aa;border:none;border-radius:10px;color:#fff;cursor:pointer;margin:5px}
#finish button:hover{background:#3366cc}
#pause{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:14px 36px;font-size:20px;background:linear-gradient(135deg,#ff6600,#ff3300);border:none;border-radius:12px;color:#fff;cursor:pointer;display:none;z-index:50;font-weight:bold}
#pause:hover{transform:translate(-50%,-50%) scale(1.08)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
<h1>3D TRACK RACER</h1>
<div class="sub">Плоский трек · 3D машинки · Безумные формы</div>
<div class="level-grid" id="lgrid"></div>
</div>
<div id="hud">
<div class="pos" id="hPos">1st</div>
<div>Лап: <span class="lap" id="hLap">1/3</span></div>
<div>Скорость: <span class="spd" id="hSpd">0</span></div>
<div>Время: <span id="hTime">0:00.0</span></div>
</div>
<canvas id="minimap" width="160" height="160"></canvas>
<div id="ctrl">WASD / Стрелки — газ · SPACE — турбо · ESC — пауза</div>
<div id="nitro"><div id="nitroF" style="width:100%"></div></div>
<div id="finish">
<h2 id="fTitle">ГОТОВО!</h2>
<div class="st" id="fStats"></div>
<button onclick="toMenu()">МЕНЮ</button>
<button onclick="restart()">ЕЩЁ РАЗ</button>
<button onclick="nextLvl()">СЛЕДУЮЩИЙ</button>
</div>
<button id="pause" onclick="restart()">ЗАНОВО</button>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const MC=document.getElementById('minimap'),MX=MC.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

const COL=['#ee3333','#3399ff','#33cc44','#ff9900','#cc44ff','#ff44aa','#44ccff','#eeee22','#ff5500','#9944ff'];
const NAM=['Феррари','Макларен','Ред Булл','Мерседес','Альфа','Уильямс','Астон','Альпин','Хаас','Порше'];
const N=250;

const LV=[
{n:'Круг',d:'Классическое кольцо',i:'O',f:t=>{const r=300;return[900+r*Math.cos(t*6.283),500+r*Math.sin(t*6.283)]},laps:3,ai:5,w:88,gr:'#1a4a1a',as:'#333'},
{n:'Овал',d:'Быстрый овал',i:'0',f:t=>{return[900+400*Math.cos(t*6.283),500+200*Math.sin(t*6.283)]},laps:4,ai:5,w:95,gr:'#1a3a1a',as:'#383838'},
{n:'Восьмёрка',d:'Крест-накрест',i:'8',f:t=>{const s=t*6.283*2;return[900+260*Math.sin(s),500+260*Math.sin(s)*Math.cos(s)*.85]},laps:3,ai:5,w:78,gr:'#1a2a1a',as:'#3a3a3a'},
{n:'Змейка',d:'Серпантин',i:'S',f:t=>{const s=t*12.566;return[450+1200*t,500+140*Math.sin(s)]},laps:2,ai:4,w:72,gr:'#2a1a1a',as:'#3a3333'},
{n:'Спираль',d:'Закручивается',i:'@',f:t=>{const r=130+240*(1-t),s=t*18.85;return[900+r*Math.cos(s),500+r*Math.sin(s)*.7]},laps:2,ai:4,w:68,gr:'#1a1a2a',as:'#333344'},
{n:'Зубчатый',d:'Много поворотов',i:'W',f:t=>{const s=t*6.283,r=270+75*Math.sin(s*5)+35*Math.cos(s*3);return[900+r*Math.cos(s),500+r*Math.sin(s)*.75]},laps:3,ai:5,w:70,gr:'#1a2a1a',as:'#363636'},
{n:'Звезда',d:'Пятиконечная',i:'*',f:t=>{const s=t*6.283,r=280+150*Math.pow(Math.cos(s*5),2);return[900+r*Math.cos(s),500+r*Math.sin(s)*.8]},laps:3,ai:5,w:66,gr:'#2a1a2a',as:'#3a3340'},
{n:'Парабола',d:'Параболические дуги',i:'~',f:t=>{const s=t*6.283;return[300+1200*t,500+180*Math.sin(s*3)+70*Math.cos(s*7)*Math.sin(s*2)]},laps:2,ai:4,w:76,gr:'#1a3a2a',as:'#334040'},
{n:'Безумие',d:'Все формы!',i:'X',f:t=>{const s=t*6.283,r=240+110*Math.sin(s*3)*Math.cos(s*2)+55*Math.sin(s*7);return[900+r*Math.cos(s),500+r*Math.sin(s)*.7]},laps:3,ai:6,w:64,gr:'#1a1a1a',as:'#404040'}
];

let unlocked=1,lv=0,gs='menu';
let pl,ais=[],cpts=[],laps=0,tLaps=0;
let cx,cy,zm=1,keys={},nitro=100,rTime=0;
let fOrder=[],parts=[];
let tc,tcLv=-1;

function gtp(t,l){
t=((t%1)+1)%1;
return LV[l||lv].f(t);
}

function buildTC(){
if(tcLv===lv&&tc)return tc;
tc=[];
for(let i=0;i<N;i++)tc.push(gtp(i/N,lv));
tcLv=lv;return tc;
}

function nearPt(px,py){
const pts=buildTC();
let bi=0,bd=1e18;
for(let i=0;i<N;i++){
const dx=px-pts[i][0],dy=py-pts[i][1],d=dx*dx+dy*dy;
if(d<bd){bd=d;bi=i}
}
return{idx:bi,t:bi/N,d:Math.sqrt(bd)};
}

function tTg(t){
const dt=.002,a=gtp(t-dt),b=gtp(t+dt);
const dx=b[0]-a[0],dy=b[1]-a[1];
const l=Math.sqrt(dx*dx+dy*dy)||1;
return[dx/l,dy/l];
}

function tNm(t){
const tg=tTg(t);
return[-tg[1],tg[0]];
}

function initRace(nlv){
lv=nlv;const L=LV[lv];
tLaps=L.laps;laps=0;rTime=0;fOrder=[];parts=[];nitro=100;
buildTC();
pl=mkCar(0,COL[0],NAM[0],true);
ais=[];
for(let i=0;i<L.ai;i++){
const t=(i+1)/(L.ai+1);
ais.push(mkCar(((t+(Math.random()-.5)*.08)%1+1)%1,COL[(i+1)%COL.length],NAM[(i+1)%NAM.length],false));
}
ais.sort((a,b)=>a.t-b.t);
mkCpts();
cx=pl.x;cy=pl.y;zm=1;
gs='racing';
document.getElementById('menu').style.display='none';
document.getElementById('hud').style.display='block';
document.getElementById('minimap').style.display='block';
document.getElementById('ctrl').style.display='block';
document.getElementById('nitro').style.display='block';
document.getElementById('finish').style.display='none';
document.getElementById('pause').style.display='none';
}

function mkCpts(){
cpts=[];
const cnt=Math.min(tLaps*3,9);
for(let i=0;i<cnt;i++){
const p=gtp(i/cnt,lv);
const n=tNm(i/cnt);
cpts.push({x:p[0],y:p[1],nx:n[0],ny:n[1]});
}
}

function mkCar(t,c,n,isP){
const p=gtp(t,lv),tg=tTg(t);
return{
x:p[0]+(Math.random()-.5)*30,y:p[1]+(Math.random()-.5)*30,
vx:0,vy:0,ang:Math.atan2(tg[1],tg[0]),spd:0,
t,c,n,isP,lap:0,lastCP:0,cpAcc:0,
off:false,done:false,fTime:0,
wob:Math.random()*100,
ms:isP?6.5:4.5+Math.random()*1.8,
ac:isP?.1:.06+Math.random()*.03,
hn:isP?.06:.045+Math.random()*.01
};
}

function updateCar(c){
const L=LV[lv],tg=tTg(c.t),tp=gtp(c.t,lv);
const dx=c.x-tp[0],dy=c.y-tp[1];
const dev=Math.sqrt(dx*dx+dy*dy);
c.off=dev>L.w*.55;
const sf=c.off?.55:1;
let ms=c.ms*sf;

let want;
if(c.isP){
want=Math.atan2(tg[1],tg[0]);
if(keys.ArrowLeft||keys.KeyA)want-=.7;
if(keys.ArrowRight||keys.KeyD)want+=.7;
}else{
c.wob+=.02;
const wo=Math.sin(c.wob)*L.w*.2;
const ah=gtp((c.t+.04)%1,lv);
const at=tTg((c.t+.04)%1);
want=Math.atan2(ah[1]+at[0]*wo-c.y,ah[0]-at[1]*wo-c.x);
}

let ad=want-c.ang;
while(ad>Math.PI)ad-=6.283;
while(ad<-Math.PI)ad+=6.283;
c.ang+=ad*c.hn*(c.off?.5:1);

let ac=0;
if(c.isP){
if(keys.ArrowUp||keys.KeyW)ac=c.ac;
if(keys.ArrowDown||keys.KeyS)ac=-c.ac*.5;
if(keys.Space&&nitro>0){ac*=1.7;nitro-=.4;ms*=1.35;}
}else{
const ideal=ms*.82;
if(c.spd<ideal)ac=c.ac*.7;
else if(c.spd>ideal*1.1)ac=-c.ac*.35;
}
c.spd+=ac;c.spd*=.97;
c.spd=Math.max(-ms*.3,Math.min(ms,c.spd));
c.vx=Math.cos(c.ang)*c.spd;
c.vy=Math.sin(c.ang)*c.spd;
c.x+=c.vx;c.y+=c.vy;

if(c.isP&&nitro<100&&!keys.Space)nitro+=.12;

const np=nearPt(c.x,c.y);
c.t=np.t;

if(c.isP){
const nc=(c.lastCP+1)%cpts.length;
const cp=cpts[nc];
const ddx=c.x-cp.x,ddy=c.y-cp.y;
if(ddx*ddx+ddy*ddy<L.w*L.w*.25){
c.lastCP=nc;
if(nc===0){c.lap++;laps=c.lap;}
}
}else{
c.cpAcc+=Math.abs(c.t-(np.t));
if(c.cpAcc>.9){
c.cpAcc=0;
c.lastCP=(c.lastCP+1)%cpts.length;
if(c.lastCP===0)c.lap++;
}
}

if(c.lap>=tLaps&&!c.done){
c.done=true;c.fTime=rTime;fOrder.push(c);
if(c.isP||fOrder.length>=ais.length+1)setTimeout(endRace,300);
}
if(c.off&&Math.abs(c.spd)>1.5&&Math.random()<.3){
parts.push({x:c.x,y:c.y,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,l:15});
}
}

function collide(){
const all=[pl,...ais];
for(let i=0;i<all.length;i++)for(let j=i+1;j<all.length;j++){
const a=all[i],b=all[j];
const dx=b.x-a.x,dy=b.y-a.y;
const d=Math.sqrt(dx*dx+dy*dy);
if(d<20&&d>0){
const p=(20-d)/2,nx=dx/d,ny=dy/d;
a.x-=nx*p;a.y-=ny*p;b.x+=nx*p;b.y+=ny*p;
a.spd*=.85;b.spd*=.85;
}
}
}

function updCam(){
cx+=(pl.x-cx)*.08;
cy+=(pl.y-cy)*.08;
const s=Math.sqrt(pl.vx*pl.vx+pl.vy*pl.vy);
zm+=(0.85+s*.015-zm)*.04;
}

function getPos(){
let p=1;
for(const a of ais){
if(a.lap>pl.lap)p++;
else if(a.lap===pl.lap&&a.t>pl.t)p++;
}return p;
}

function drawTrack(){
const L=LV[lv],pts=buildTC(),w=L.w;
const ox=W/2-cx*zm,oy=H/2-cy*zm;
X.save();X.translate(ox,oy);X.scale(zm,zm);

X.strokeStyle=L.as;X.lineWidth=w;X.lineCap='round';X.lineJoin='round';
X.beginPath();X.moveTo(pts[0][0],pts[0][1]);
for(let i=1;i<N;i++)X.lineTo(pts[i][0],pts[i][1]);
X.closePath();X.stroke();

X.strokeStyle='#4a4a4a';X.lineWidth=w-6;
X.beginPath();X.moveTo(pts[0][0],pts[0][1]);
for(let i=1;i<N;i++)X.lineTo(pts[i][0],pts[i][1]);
X.closePath();X.stroke();

X.strokeStyle='rgba(255,255,255,.25)';X.lineWidth=2;X.setLineDash([16,24]);
X.beginPath();X.moveTo(pts[0][0],pts[0][1]);
for(let i=1;i<N;i++)X.lineTo(pts[i][0],pts[i][1]);
X.closePath();X.stroke();
X.setLineDash([]);

for(let i=0;i<cpts.length;i++){
const cp=cpts[i],fin=i===0;
X.strokeStyle=fin?'#fff':'rgba(255,255,0,.35)';
X.lineWidth=fin?5:2;
X.beginPath();
X.moveTo(cp.x+cp.nx*w*.42,cp.y+cp.ny*w*.42);
X.lineTo(cp.x-cp.nx*w*.42,cp.y-cp.ny*w*.42);
X.stroke();
}
X.restore();
}

function drawCar(c){
const ox=W/2-cx*zm,oy=H/2-cy*zm;
const sx=ox+c.x*zm,sy=oy+c.y*zm,sc=zm*.8;
if(sc<.2)return;
X.save();X.translate(sx,sy);X.rotate(c.ang);
const cw=13*sc,ch=26*sc;

X.fillStyle='rgba(0,0,0,.25)';
X.beginPath();X.arc(2*sc,2*sc,ch*.5,0,6.283);X.fill();

const g=X.createLinearGradient(-cw/2,-ch/2,cw/2,ch/2);
const cc=hex2rgb(c.c);
g.addColorStop(0,`rgb(${Math.min(255,cc[0]+50)},${Math.min(255,cc[1]+50)},${Math.min(255,cc[2]+50)})`);
g.addColorStop(.5,c.c);
g.addColorStop(1,`rgb(${Math.max(0,cc[0]-35)},${Math.max(0,cc[1]-35)},${Math.max(0,cc[2]-35)})`);
X.fillStyle=g;
X.beginPath();
X.moveTo(-cw*.35,-ch*.5);X.lineTo(cw*.35,-ch*.5);
X.lineTo(cw*.45,-ch*.15);X.lineTo(cw*.4,ch*.35);
X.lineTo(cw*.25,ch*.5);X.lineTo(-cw*.25,ch*.5);
X.lineTo(-cw*.4,ch*.35);X.lineTo(-cw*.45,-ch*.15);
X.closePath();X.fill();
X.strokeStyle='rgba(0,0,0,.35)';X.lineWidth=1;X.stroke();

X.fillStyle='rgba(140,210,255,.55)';
X.beginPath();
X.moveTo(-cw*.28,-ch*.4);X.lineTo(cw*.28,-ch*.4);
X.lineTo(cw*.23,-ch*.22);X.lineTo(-cw*.23,-ch*.22);
X.closePath();X.fill();

X.fillStyle='#111';
X.beginPath();X.arc(-cw*.42,-ch*.3,sc*3,0,6.283);X.fill();
X.beginPath();X.arc(cw*.42,-ch*.3,sc*3,0,6.283);X.fill();
X.beginPath();X.arc(-cw*.42,ch*.3,sc*3,0,6.283);X.fill();
X.beginPath();X.arc(cw*.42,ch*.3,sc*3,0,6.283);X.fill();

if(c.isP&&nitro>20){
X.globalAlpha=.25+Math.random()*.3;
const fl=X.createRadialGradient(0,ch*.5,0,0,ch*.5+12*sc,10*sc);
fl.addColorStop(0,'#fff');fl.addColorStop(.3,'#ff8800');fl.addColorStop(1,'rgba(255,50,0,0)');
X.fillStyle=fl;X.fillRect(-5*sc,ch*.45,10*sc,16*sc);
X.globalAlpha=1;
}
X.restore();

X.fillStyle=c.isP?'#fff':'rgba(255,255,255,.6)';
X.font=`${Math.max(8,10*sc)}px sans-serif`;X.textAlign='center';
X.fillText(c.n,sx,sy-16*sc);
if(c.isP){X.fillStyle='#ffd700';X.fillText('\u25BC',sx,sy-24*sc);}
}

function hex2rgb(h){
return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
}

function drawMinimap(){
MX.clearRect(0,0,160,160);
MX.fillStyle='rgba(0,0,0,.5)';MX.fillRect(0,0,160,160);
const pts=buildTC();
let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
for(const p of pts){x0=Math.min(x0,p[0]);x1=Math.max(x1,p[0]);y0=Math.min(y0,p[1]);y1=Math.max(y1,p[1]);}
const sx=(x1-x0)||1,sy=(y1-y0)||1;
const sc=Math.min(140/sx,140/sy)*.85;
const ox2=80-sx*sc/2-x0*sc,oy2=80-sy*sc/2-y0*sc;
MX.strokeStyle='#555';MX.lineWidth=3;MX.beginPath();
for(let i=0;i<N;i++){
const x=ox2+pts[i][0]*sc,y=oy2+pts[i][1]*sc;
i===0?MX.moveTo(x,y):MX.lineTo(x,y);
}MX.closePath();MX.stroke();
for(const a of ais){MX.fillStyle=a.c;MX.beginPath();MX.arc(ox2+a.x*sc,oy2+a.y*sc,3,0,6.283);MX.fill();}
MX.fillStyle='#fff';MX.beginPath();MX.arc(ox2+pl.x*sc,oy2+pl.y*sc,4,0,6.283);MX.fill();
}

function drawHUD(){
const p=getPos();
document.getElementById('hPos').textContent=['1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th'][p-1]||p+'th';
document.getElementById('hPos').style.color=p===1?'#ffd700':p<=3?'#c0c0c0':'#aaa';
document.getElementById('hLap').textContent=Math.min(laps+1,tLaps)+'/'+tLaps;
document.getElementById('hSpd').textContent=Math.round(Math.sqrt(pl.vx*pl.vx+pl.vy*pl.vy)*22);
const m=Math.floor(rTime/60),s=(rTime%60).toFixed(1);
document.getElementById('hTime').textContent=m+':'+s.padStart(4,'0');
document.getElementById('nitroF').style.width=nitro+'%';
}

function endRace(){
gs='finished';
document.getElementById('pause').style.display='none';
const ov=document.getElementById('finish');ov.style.display='flex';
const p=getPos();
document.getElementById('fTitle').textContent=p===1?'ПОБЕДА!':'Финиш — '+p+' место';
document.getElementById('fTitle').style.color=p===1?'#ffd700':'#aaa';
const m=Math.floor(pl.fTime/60),s=(pl.fTime%60).toFixed(1);
let st='Время: '+m+':'+s.padStart(4,'0')+'<br>Позиция: '+['1st','2nd','3rd'][p-1]+'<br><br>';
st+='<span style="color:#888">Результаты:</span><br>';
fOrder.forEach((c,i)=>{st+='<span style="color:'+c.c+'">'+(i+1)+'. '+c.n+'</span><br>';});
document.getElementById('fStats').innerHTML=st;
if(p<=3&&lv+1<LV.length)unlocked=Math.max(unlocked,lv+2);
}

function loop(){
requestAnimationFrame(loop);
if(gs!=='racing')return;
rTime+=1/60;
updateCar(pl);
for(const a of ais)updateCar(a);
collide();updCam();

const L=LV[lv];
X.fillStyle=L.gr;X.fillRect(0,0,W,H);
drawTrack();

for(const p of parts){
X.globalAlpha=p.l/15;X.fillStyle='#8a6';
X.beginPath();X.arc(W/2-cx*zm+p.x*zm,H/2-cy*zm+p.y*zm,2*zm,0,6.283);X.fill();
p.x+=p.vx;p.y+=p.vy;p.l--;
}X.globalAlpha=1;parts=parts.filter(p=>p.l>0);

const all=[pl,...ais];
all.sort((a,b)=>{
const da=(a.y-cy)*(a.y-cy)+(a.x-cx)*(a.x-cx);
const db=(b.y-cy)*(b.y-cy)+(b.x-cx)*(b.x-cx);
return db-da;
});
for(const c of all)drawCar(c);

drawMinimap();drawHUD();
}

function buildMenu(){
const g=document.getElementById('lgrid');g.innerHTML='';
LV.forEach((l,i)=>{
const b=document.createElement('div');
b.className='lvl-btn'+(i>=unlocked?' locked':'');
b.innerHTML='<div class="icon">'+l.i+'</div><div class="name">'+l.n+'</div><div class="desc">'+l.d+' · '+l.laps+' кругов · '+l.ai+' соперн.</div>';
if(i<unlocked)b.onclick=function(){initRace(i)};
g.appendChild(b);
});
}

function restart(){initRace(lv)}
function toMenu(){
gs='menu';
document.getElementById('menu').style.display='flex';
document.getElementById('hud').style.display='none';
document.getElementById('minimap').style.display='none';
document.getElementById('ctrl').style.display='none';
document.getElementById('nitro').style.display='none';
document.getElementById('finish').style.display='none';
document.getElementById('pause').style.display='none';
buildMenu();
}
function nextLvl(){if(lv+1<LV.length)initRace(lv+1);else toMenu();}

addEventListener('keydown',e=>{
keys[e.code]=true;
if(e.code==='Escape'&&gs==='racing'){
gs='paused';
document.getElementById('pause').style.display='block';
}else if(e.code==='Escape'&&gs==='paused'){
gs='racing';
document.getElementById('pause').style.display='none';
}
});
addEventListener('keyup',e=>{keys[e.code]=false});

buildMenu();requestAnimationFrame(loop);
</script>
</body>
</html>
