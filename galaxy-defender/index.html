<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Defender</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#ui { position: absolute; top: 15px; left: 15px; color: #0ff; font-size: 18px; text-shadow: 0 0 10px #0ff; pointer-events: none; }
#startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); color: #fff; z-index: 10; }
#startScreen h1, #gameOverScreen h1 { font-size: 56px; color: #0ff; text-shadow: 0 0 30px #0ff, 0 0 60px #08f; margin-bottom: 10px; }
#startScreen p, #gameOverScreen p { font-size: 18px; color: #aaf; margin-bottom: 30px; }
#finalScore { font-size: 36px; color: #ff0; text-shadow: 0 0 20px #ff0; margin-bottom: 20px; }
button { padding: 15px 50px; font-size: 22px; background: transparent; border: 2px solid #0ff; color: #0ff; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 3px; }
button:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }
#healthBar { width: 200px; height: 12px; background: #333; border: 1px solid #0ff; margin-top: 5px; }
#healthFill { height: 100%; background: linear-gradient(90deg, #0f0, #ff0, #f00); transition: width 0.2s; width: 100%; }
.controls { color: #888; font-size: 14px; margin-top: 20px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div>ОЧКИ: <span id="score">0</span></div>
    <div>ВОЛНА: <span id="wave">1</span></div>
    <div>ЗДОРОВЬЕ:</div>
    <div id="healthBar"><div id="healthFill"></div></div>
    <div style="margin-top:8px;">БОМБЫ: <span id="bombs">3</span></div>
</div>

<div id="startScreen">
    <h1>GALAXY DEFENDER</h1>
    <p>Защити галактику от инопланетного вторжения!</p>
    <button onclick="startGame()">НАЧАТЬ ИГРУ</button>
    <div class="controls">
        WASD / Стрелки — движение &nbsp;|&nbsp; Пробел — стрелять &nbsp;|&nbsp; B — бомба
    </div>
</div>

<div id="gameOverScreen" style="display:none;">
    <h1>ИГРА ОКОНЧЕНА</h1>
    <div id="finalScore">0</div>
    <button onclick="startGame()">ИГРАТЬ СНОВА</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

let player, bullets, enemies, particles, powerups, stars;
let score, wave, gameRunning, keys, spawnTimer, waveEnemiesLeft, health, bombs;
let shakeTimer = 0, lastTime = 0;

const STAR_COUNT = 200;
const PLAYER_SPEED = 5;
const BULLET_SPEED = 10;
const FIRE_RATE = 8;

function createStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, speed: Math.random() * 2 + 0.5, size: Math.random() * 2 + 0.5 });
    }
}

function drawStars() {
    stars.forEach(s => {
        ctx.fillStyle = `rgba(200,220,255,${s.speed / 2.5})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    });
}

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';

    player = { x: canvas.width / 2, y: canvas.height - 80, w: 40, h: 40, fireTimer: 0, invincible: 0 };
    bullets = [];
    enemies = [];
    particles = [];
    powerups = [];
    score = 0;
    wave = 1;
    health = 100;
    bombs = 3;
    gameRunning = true;
    keys = {};
    spawnTimer = 0;
    waveEnemiesLeft = 10;

    createStars();
    updateUI();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameRunning = false;
    document.getElementById('finalScore').textContent = 'ОЧКИ: ' + score;
    document.getElementById('gameOverScreen').style.display = 'flex';
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('wave').textContent = wave;
    document.getElementById('healthFill').style.width = health + '%';
    document.getElementById('bombs').textContent = bombs;
}

function spawnEnemy() {
    const type = Math.random();
    let enemy;
    if (type < 0.6) {
        enemy = { x: Math.random() * (canvas.width - 60) + 30, y: -30, w: 30, h: 30, hp: 1, speed: 2 + wave * 0.3, score: 10, type: 'basic', shootTimer: 0 };
    } else if (type < 0.85) {
        enemy = { x: Math.random() * (canvas.width - 80) + 40, y: -40, w: 45, h: 45, hp: 3, speed: 1.5 + wave * 0.2, score: 25, type: 'tank', shootTimer: 0 };
    } else {
        enemy = { x: Math.random() * (canvas.width - 50) + 25, y: -25, w: 25, h: 25, hp: 1, speed: 4 + wave * 0.4, score: 15, type: 'fast', shootTimer: 0, angle: Math.random() * Math.PI * 2 };
    }
    enemies.push(enemy);
}

function spawnPowerup(x, y) {
    if (Math.random() < 0.15) {
        const types = ['health', 'bomb'];
        powerups.push({ x, y, type: types[Math.floor(Math.random() * types.length)], w: 20, h: 20, life: 300 });
    }
}

function useBomb() {
    if (bombs <= 0) return;
    bombs--;
    shakeTimer = 15;

    enemies.forEach(e => {
        for (let i = 0; i < 20; i++) {
            particles.push({ x: e.x, y: e.y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, life: 30, maxLife: 30, color: '#f80', size: 3 });
        }
        score += e.score;
    });
    enemies = [];
    updateUI();
}

function drawPlayer() {
    const p = player;
    if (p.invincible > 0 && Math.floor(p.invincible / 3) % 2 === 0) return;

    ctx.save();
    ctx.translate(p.x, p.y);

    // Корпус
    ctx.fillStyle = '#0af';
    ctx.beginPath();
    ctx.moveTo(0, -22);
    ctx.lineTo(-18, 18);
    ctx.lineTo(-6, 12);
    ctx.lineTo(0, 16);
    ctx.lineTo(6, 12);
    ctx.lineTo(18, 18);
    ctx.closePath();
    ctx.fill();

    // Кабина
    ctx.fillStyle = '#0ff';
    ctx.beginPath();
    ctx.arc(0, -2, 6, 0, Math.PI * 2);
    ctx.fill();

    // Пламя двигателя
    ctx.fillStyle = `hsl(${Math.random()*40+10},100%,60%)`;
    ctx.beginPath();
    ctx.moveTo(-5, 16);
    ctx.lineTo(0, 16 + Math.random() * 14 + 6);
    ctx.lineTo(5, 16);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);

    if (e.type === 'basic') {
        ctx.fillStyle = '#f44';
        ctx.beginPath();
        ctx.moveTo(0, 18);
        ctx.lineTo(-16, -10);
        ctx.lineTo(-6, -6);
        ctx.lineTo(0, -16);
        ctx.lineTo(6, -6);
        ctx.lineTo(16, -10);
        ctx.closePath();
        ctx.fill();
    } else if (e.type === 'tank') {
        ctx.fillStyle = '#a0f';
        ctx.fillRect(-22, -12, 44, 24);
        ctx.fillStyle = '#c4f';
        ctx.fillRect(-10, -8, 20, 16);
        ctx.fillStyle = '#f0f';
        ctx.fillRect(-3, -18, 6, 12);
    } else {
        ctx.fillStyle = '#ff0';
        ctx.rotate(Date.now() / 200);
        ctx.fillRect(-10, -10, 20, 20);
        ctx.fillStyle = '#ffa';
        ctx.fillRect(-6, -6, 12, 12);
    }

    // HP bar
    if (e.hp > 1) {
        ctx.fillStyle = '#600';
        ctx.fillRect(-15, -e.h / 2 - 8, 30, 4);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(-15, -e.h / 2 - 8, 30 * (e.hp / (e.type === 'tank' ? 3 : 1)), 4);
    }

    ctx.restore();
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: Math.random() * 20 + 10,
            maxLife: 30,
            color,
            size: Math.random() * 3 + 1
        });
    }
}

function fireBullet() {
    bullets.push({ x: player.x, y: player.y - 20, w: 4, h: 12, vy: -BULLET_SPEED });
    spawnParticles(player.x, player.y - 15, '#0ff', 3);
}

function enemyFire(e) {
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = 4;
    bullets.push({ x: e.x, y: e.y + e.h / 2, w: 6, h: 6, vx: (dx / dist) * speed, vy: (dy / dist) * speed, isEnemy: true });
}

function update() {
    if (!gameRunning) return;

    // Player movement
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= PLAYER_SPEED;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += PLAYER_SPEED;
    if (keys['ArrowUp'] || keys['KeyW']) player.y -= PLAYER_SPEED;
    if (keys['ArrowDown'] || keys['KeyS']) player.y += PLAYER_SPEED;

    player.x = Math.max(25, Math.min(canvas.width - 25, player.x));
    player.y = Math.max(25, Math.min(canvas.height - 25, player.y));

    // Auto fire
    if (keys['Space']) {
        player.fireTimer++;
        if (player.fireTimer >= FIRE_RATE) {
            fireBullet();
            player.fireTimer = 0;
        }
    }

    if (player.invincible > 0) player.invincible--;

    // Bullets
    bullets.forEach(b => {
        b.x += b.vx || 0;
        b.y += b.vy || 0;
    });
    bullets = bullets.filter(b => b.y > -20 && b.y < canvas.height + 20 && b.x > -20 && b.x < canvas.width + 20);

    // Enemies
    spawnTimer++;
    const spawnRate = Math.max(20, 60 - wave * 5);
    if (spawnTimer >= spawnRate && waveEnemiesLeft > 0) {
        spawnEnemy();
        waveEnemiesLeft--;
        spawnTimer = 0;
    }

    // Next wave
    if (waveEnemiesLeft <= 0 && enemies.length === 0) {
        wave++;
        waveEnemiesLeft = 10 + wave * 3;
        // Bonus bombs
        if (wave % 3 === 0) bombs++;
        updateUI();
    }

    enemies.forEach(e => {
        if (e.type === 'fast') {
            e.x += Math.cos(e.angle) * e.speed;
            e.y += e.speed * 0.8;
            if (e.x < 20 || e.x > canvas.width - 20) e.angle = Math.PI - e.angle;
        } else {
            e.y += e.speed;
            e.x += Math.sin(Date.now() / 500 + e.x) * 0.5;
        }

        e.shootTimer = (e.shootTimer || 0) + 1;
        if (e.shootTimer > 120 && Math.random() < 0.02) {
            enemyFire(e);
            e.shootTimer = 0;
        }
    });

    enemies = enemies.filter(e => e.y < canvas.height + 50);

    // Collision: bullets vs enemies
    bullets.forEach((b, bi) => {
        if (b.isEnemy) return;
        enemies.forEach((e, ei) => {
            if (Math.abs(b.x - e.x) < (e.w / 2 + b.w) && Math.abs(b.y - e.y) < (e.h / 2 + b.h)) {
                e.hp--;
                spawnParticles(b.x, b.y, '#ff0', 5);
                bullets.splice(bi, 1);
                if (e.hp <= 0) {
                    score += e.score;
                    spawnParticles(e.x, e.y, e.type === 'tank' ? '#a0f' : '#f44', 20);
                    spawnPowerup(e.x, e.y);
                    enemies.splice(enemies.indexOf(e), 1);
                    shakeTimer = 5;
                    updateUI();
                }
            }
        });
    });

    // Collision: enemy bullets vs player
    bullets.forEach((b, bi) => {
        if (!b.isEnemy) return;
        if (Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 18 && player.invincible <= 0) {
            health -= 15;
            spawnParticles(player.x, player.y, '#f00', 15);
            bullets.splice(bi, 1);
            player.invincible = 60;
            shakeTimer = 8;
            updateUI();
            if (health <= 0) gameOver();
        }
    });

    // Collision: enemies vs player
    enemies.forEach((e, i) => {
        if (Math.abs(e.x - player.x) < (e.w / 2 + 15) && Math.abs(e.y - player.y) < (e.h / 2 + 15) && player.invincible <= 0) {
            health -= 30;
            spawnParticles(e.x, e.y, '#f80', 25);
            enemies.splice(i, 1);
            player.invincible = 90;
            shakeTimer = 12;
            updateUI();
            if (health <= 0) gameOver();
        }
    });

    // Powerups
    powerups.forEach((pu, i) => {
        pu.y += 1.5;
        pu.life--;
        if (Math.abs(pu.x - player.x) < 25 && Math.abs(pu.y - player.y) < 25) {
            if (pu.type === 'health') health = Math.min(100, health + 30);
            if (pu.type === 'bomb') bombs++;
            spawnParticles(pu.x, pu.y, pu.type === 'health' ? '#0f0' : '#f80', 15);
            powerups.splice(i, 1);
            updateUI();
        }
    });
    powerups = powerups.filter(p => p.life > 0 && p.y < canvas.height + 20);

    // Particles
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life--;
    });
    particles = particles.filter(p => p.life > 0);
}

function draw() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Shake
    if (shakeTimer > 0) {
        ctx.save();
        ctx.translate((Math.random() - 0.5) * shakeTimer * 2, (Math.random() - 0.5) * shakeTimer * 2);
        shakeTimer--;
    }

    drawStars();

    // Bullets
    bullets.forEach(b => {
        if (b.isEnemy) {
            ctx.fillStyle = '#f44';
            ctx.shadowColor = '#f00';
        } else {
            ctx.fillStyle = '#0ff';
            ctx.shadowColor = '#0ff';
        }
        ctx.shadowBlur = 10;
        ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    });
    ctx.shadowBlur = 0;

    // Enemies
    enemies.forEach(e => drawEnemy(e));

    // Powerups
    powerups.forEach(pu => {
        ctx.save();
        ctx.translate(pu.x, pu.y);
        ctx.rotate(Date.now() / 500);
        ctx.fillStyle = pu.type === 'health' ? '#0f0' : '#f80';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 15;
        ctx.fillRect(-10, -10, 20, 20);
        ctx.fillStyle = '#fff';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(pu.type === 'health' ? '+' : 'B', 0, 5);
        ctx.restore();
    });
    ctx.shadowBlur = 0;

    // Particles
    particles.forEach(p => {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // Player
    drawPlayer();

    if (shakeTimer > 0) ctx.restore();
}

function gameLoop(time) {
    if (!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Input
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'KeyB' && gameRunning) useBomb();
    if (e.code === 'Space') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
let touchStart = null;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
    keys['Space'] = true;
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!touchStart) return;
    const t = e.touches[0];
    player.x += t.clientX - touchStart.x;
    player.y += t.clientY - touchStart.y;
    player.x = Math.max(25, Math.min(canvas.width - 25, player.x));
    player.y = Math.max(25, Math.min(canvas.height - 25, player.y));
    touchStart = { x: t.clientX, y: t.clientY };
});
canvas.addEventListener('touchend', () => { keys['Space'] = false; touchStart = null; });

createStars();
</script>
</body>
</html>
